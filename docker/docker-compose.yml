services:
  db:
    image: postgres:15-alpine
    container_name: pos-db
    environment:
      POSTGRES_USER: ${DB_USER:-pos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pos}
      POSTGRES_DB: ${DB_NAME:-punto_venta}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pos} -d ${DB_NAME:-punto_venta}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: pos-backend
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    volumes:
      - ../backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000
    container_name: pos-frontend
    ports:
      - "5173:5173"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

volumes:
  postgres_data: